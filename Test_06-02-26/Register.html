<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="./Register.css">
</head>
<body>
    <h1 style="text-align: center;">Register</h1>
    <div class="border">
    <div class="container">
        <div class="name">
            <label for="name">Name</label>
            <input type="name" id="name" placeholder="Enter your Name" autocomplete="off" required>  
        </div>
        <br />
        <div class="email">
            <label for="email">Add Email</label>
            <input type="email" id="email" placeholder="abc@email.com" autocomplete="off" required> 
        </div>
        <br />
        <div class="password">
            <label for="password">Create Password</label>
            <input type="password" id="password" autocomplete="off" required>
        </div>
        <br />
        <div> 
            <button class="register-btn" onclick="registerUser()"> Register </button>
            <p id="error" style="color:red;"></p>
        </div>
    </div>
    </div>
   <script src="./Register.js"></script> 
</body>
</html>
