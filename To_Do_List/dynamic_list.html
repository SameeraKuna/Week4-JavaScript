<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Simple To‑Do (Add / Toggle / Delete with Delegation)</title>
</head>
<body>

  <h2>To‑Do List</h2>

 <!-- For input and add button -->
  <form id="dynamicForm" autocomplete="off">
    <input id="Input" type="text" placeholder="Add an item to the list" />
    <button id="addBtn" type="submit">Add</button>
  </form>

  <!--Container  for list -->
  <ul id="todoList"></ul>

</body>
</html>
